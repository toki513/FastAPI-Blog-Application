<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Title -->
  {% if title %}
    <title>FastAPI Blog - {{ title }}</title>
  {% else %}
    <title>FastAPI Blog</title>
  {% endif %}

  <meta name="description" content="FastAPI Tutorial">
  <meta name="author" content="Corey Schafer">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Nunito:wght@400;600&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ url_for('static', path='css/main.css') }}">

  <!-- Favicon -->
  <link rel="icon" href="{{ url_for('static', path='icons/favicon.ico') }}">

</head>

<body class="d-flex flex-column min-vh-100">

  <!-- Navbar -->
  <header class="site-header">
    <nav class="navbar navbar-expand-md bg-dark navbar-dark fixed-top">
      <div class="container">

        <a class="navbar-brand me-4" href="{{ url_for('home') }}">FastAPI Blog</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarToggle">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarToggle">

          <div class="navbar-nav me-auto">
            <a class="nav-link" href="{{ url_for('home') }}">Home</a>
          </div>

          <div class="navbar-nav">
            <a class="btn btn-outline-light me-2" href="#">Login</a>
            <a class="btn btn-light" href="#">Register</a>
          </div>

        </div>
      </div>
    </nav>
  </header>


  <!-- Main Content -->
  <main class="container" style="margin-top:80px;">
    <div class="row">

      <div class="col-md-8">
        {% block content %}{% endblock content %}
      </div>

      <div class="col-md-4">
        <div class="content-section p-4 mb-4">
          <h3>Our Sidebar</h3>
          <p class="text-muted">
            You can put any information here you'd like.
          </p>

          <ul class="list-group">
            <li class="list-group-item">Latest Posts</li>
            <li class="list-group-item">Announcements</li>
            <li class="list-group-item">Calendars</li>
            <li class="list-group-item">etc</li>
          </ul>
        </div>
      </div>

    </div>
  </main>


  <!-- Footer -->
  <footer class="mt-auto py-3 bg-light border-top">
    <div class="container text-center">
      <p class="text-muted mb-0">
        © <span id="year"></span> FastAPi Blog
      </p>
    </div>
  </footer>


  <!-- Year Script -->
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>


  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
